name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  database:
    name: Database migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: averion_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d averion_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: averion_test
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Supabase API roles
        run: |
          psql --set ON_ERROR_STOP=1 <<'SQL'
          create role anon nologin;
          create role authenticated nologin;
          SQL

      - name: Apply migrations
        run: |
          for migration in supabase/migrations/*.sql; do
            echo "Applying ${migration}"
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done

      - name: Reapply safe migrations
        run: |
          for migration in supabase/migrations/*.sql; do
            echo "Reapplying ${migration}"
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done

      - name: Verify schema, tenancy constraints, and RLS
        run: psql --set ON_ERROR_STOP=1 --file supabase/tests/verify_schema.sql

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  api:
    name: API
    runs-on: ubuntu-latest
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: apps/api/.python-version
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
